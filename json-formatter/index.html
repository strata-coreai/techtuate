<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JSON Formatter &middot; techtuate</title>
  <meta name="description" content="Paste JSON to instantly format, validate, and minify it. No server, no account, stays in your tab." />
  <meta name="color-scheme" content="light" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ffd60a'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-weight='900' font-size='36' fill='%230a0a0a'%3E%7B%7D%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    :root {
      --bg:        #ffffff;
      --bg-soft:   #fafaf7;
      --ink:       #0a0a0a;
      --ink-mute:  #3a3a3a;
      --ink-dim:   #707070;
      --line:      #e6e6e6;
      --yellow:      #ffd60a;
      --yellow-soft: #fff3a6;
      --yellow-deep: #f5c400;
      --font-display: "Inter Tight", "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-body:    "Inter", "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
      --font-mono:    ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 14.5px;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    button, input, select, textarea { font: inherit; color: inherit; }
    ::selection { background: var(--yellow); color: var(--ink); }

    /* ---- topbar ---- */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg);
      border-bottom: 2px solid var(--ink);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .topbar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.005em;
    }

    .topbar .brand-mark {
      width: 26px;
      height: 26px;
      background: var(--yellow);
      border: 2px solid var(--ink);
      border-radius: 8px;
      display: grid;
      place-items: center;
      box-shadow: 2px 2px 0 var(--ink);
      flex-shrink: 0;
    }

    .topbar .brand-mark::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ink);
    }

    .topbar .brand span.hl { background: var(--yellow); padding: 0 3px; }
    .topbar .sep { color: var(--ink-dim); font-family: var(--font-mono); }
    .topbar .tool-name {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--ink-mute);
    }

    /* ---- main content ---- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      min-height: 0;
    }

    /* ---- toolbar ---- */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg);
      border: 2px solid var(--ink);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 600;
      transition: transform .12s ease, box-shadow .12s ease, background .12s;
      box-shadow: 2px 2px 0 var(--ink);
    }

    .btn:hover:not(:disabled) {
      background: var(--yellow);
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    .btn:active:not(:disabled) {
      transform: translate(0, 0);
      box-shadow: 1px 1px 0 var(--ink);
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn.primary {
      background: var(--yellow);
    }

    .btn.primary:hover:not(:disabled) {
      background: var(--ink);
      color: var(--yellow);
    }

    .btn.ghost {
      background: transparent;
      border-color: var(--line);
      box-shadow: none;
      font-weight: 500;
    }

    .btn.ghost:hover:not(:disabled) {
      background: var(--yellow);
      border-color: var(--ink);
      transform: none;
      box-shadow: none;
    }

    /* ---- two-column layout ---- */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .col-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
      font-weight: 700;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 300px;
      border: 2px solid var(--ink);
      border-radius: 10px;
      padding: 14px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.55;
      background: var(--bg);
      resize: vertical;
      box-shadow: 3px 3px 0 var(--ink);
      outline: none;
      transition: box-shadow .12s ease, border-color .12s ease;
    }

    textarea:focus {
      border-color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
    }

    textarea[readonly] {
      background: var(--bg-soft);
      cursor: default;
    }

    /* ---- error banner ---- */
    .error-msg {
      padding: 10px 14px;
      border: 2px solid var(--ink);
      background: var(--yellow);
      border-radius: 8px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-mono);
      display: none;
    }

    .error-msg.visible { display: block; }

    /* ---- stats line ---- */
    .stats {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink-dim);
      min-height: 18px;
    }

    /* ---- copy flash ---- */
    .copy-flash {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink-mute);
      margin-left: auto;
      opacity: 0;
      transition: opacity .2s;
    }

    .copy-flash.show { opacity: 1; }

    /* ---- responsive ---- */
    @media (max-width: 700px) {
      .columns { grid-template-columns: 1fr; }
      textarea { min-height: 180px; }
      .main { padding: 14px; gap: 12px; }
    }

    @media (max-width: 360px) {
      .topbar .sep, .topbar .tool-name { display: none; }
      .topbar { padding: 8px 10px; }
      textarea { min-height: 140px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="/" title="Back to techtuate">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>tech<span class="hl">tuate</span></span>
    </a>
    <span class="sep">/</span>
    <span class="tool-name">json-formatter</span>
  </header>

  <div class="main">
    <div class="toolbar">
      <button class="btn primary" id="btn-format">Format</button>
      <button class="btn" id="btn-minify">Minify</button>
      <button class="btn" id="btn-copy">Copy</button>
      <button class="btn ghost" id="btn-clear">Clear</button>
      <span class="copy-flash" id="copy-flash" aria-live="polite">copied!</span>
    </div>

    <div id="error-msg" class="error-msg" role="alert"></div>
    <div id="stats" class="stats"></div>

    <div class="columns">
      <div class="col">
        <span class="col-label">Input</span>
        <textarea id="input" placeholder="Paste JSON here…" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>
      <div class="col">
        <span class="col-label">Output</span>
        <textarea id="output" readonly placeholder="Formatted JSON will appear here…" spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <script>
    const inputEl  = document.getElementById('input');
    const outputEl = document.getElementById('output');
    const errorEl  = document.getElementById('error-msg');
    const statsEl  = document.getElementById('stats');
    const copyFlash = document.getElementById('copy-flash');

    let debounceTimer = null;

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
    }

    function clearError() {
      errorEl.classList.remove('visible');
      errorEl.textContent = '';
    }

    function countKeys(obj) {
      if (typeof obj !== 'object' || obj === null) return 0;
      let n = 0;
      const stack = [obj];
      while (stack.length) {
        const cur = stack.pop();
        if (Array.isArray(cur)) {
          for (const v of cur) { if (typeof v === 'object' && v !== null) stack.push(v); }
        } else {
          const keys = Object.keys(cur);
          n += keys.length;
          for (const k of keys) { if (typeof cur[k] === 'object' && cur[k] !== null) stack.push(cur[k]); }
        }
      }
      return n;
    }

    function format(raw) {
      const trimmed = raw.trim();
      if (!trimmed) { outputEl.value = ''; clearError(); statsEl.textContent = ''; return; }
      try {
        const parsed = JSON.parse(trimmed);
        const formatted = JSON.stringify(parsed, null, 2);
        outputEl.value = formatted;
        clearError();
        const chars = formatted.length;
        const keys = countKeys(parsed);
        statsEl.textContent = `${chars.toLocaleString()} chars · ~${keys.toLocaleString()} key${keys !== 1 ? 's' : ''}`;
      } catch (e) {
        outputEl.value = '';
        statsEl.textContent = '';
        showError('Invalid JSON: ' + e.message);
      }
    }

    function minify() {
      const raw = inputEl.value.trim();
      if (!raw) return;
      try {
        const parsed = JSON.parse(raw);
        const minified = JSON.stringify(parsed);
        outputEl.value = minified;
        clearError();
        statsEl.textContent = `${minified.length.toLocaleString()} chars (minified)`;
      } catch (e) {
        outputEl.value = '';
        statsEl.textContent = '';
        showError('Invalid JSON: ' + e.message);
      }
    }

    async function copyOutput() {
      const text = outputEl.value;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        copyFlash.classList.add('show');
        setTimeout(() => copyFlash.classList.remove('show'), 1600);
      } catch {
        // Fallback
        outputEl.select();
        document.execCommand('copy');
      }
    }

    function clear() {
      inputEl.value = '';
      outputEl.value = '';
      clearError();
      statsEl.textContent = '';
    }

    // Real-time formatting with debounce
    inputEl.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => format(inputEl.value), 300);
    });

    document.getElementById('btn-format').addEventListener('click', () => format(inputEl.value));
    document.getElementById('btn-minify').addEventListener('click', minify);
    document.getElementById('btn-copy').addEventListener('click', copyOutput);
    document.getElementById('btn-clear').addEventListener('click', clear);
  </script>
</body>
</html>
